<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="head" x1="64" y1="56" x2="1370" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05203C"/>
      <stop offset="1" stop-color="#0062E3"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="2000" height="2000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#05203C" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1440" height="1024" fill="#F5F9FE"/>
  <rect x="48" y="48" width="1344" height="212" rx="36" fill="url(#head)"/>
  <circle cx="1278" cy="124" r="96" fill="#A1EEFF" fill-opacity="0.15"/>
  <circle cx="1348" cy="206" r="48" fill="#93FFDE" fill-opacity="0.18"/>

  <text x="112" y="106" fill="white" font-size="28" font-family="Arial, sans-serif" font-weight="700">Skyscanner Ads Survey</text>
  <text x="112" y="164" fill="white" font-size="50" font-family="Arial, sans-serif" font-weight="700">Help us improve the ad creation experience</text>
  <text x="112" y="210" fill="#D9F8FF" font-size="22" font-family="Arial, sans-serif">
    <tspan x="112" dy="0">We want to understand what feels clear, what feels missing, and which analytics</tspan>
    <tspan x="112" dy="30">signals help you make faster campaign decisions.</tspan>
  </text>

  <g filter="url(#cardShadow)">
    <rect x="96" y="300" width="1248" height="628" rx="32" fill="white"/>
  </g>

  <g>
    <text x="136" y="360" fill="#05203C" font-size="22" font-family="Arial, sans-serif" font-weight="700">1. Which ad format feels most intuitive to create and why?</text>
    <rect x="136" y="382" width="1168" height="60" rx="18" fill="#F7FAFD" stroke="#D7E2ED" stroke-width="2"/>

    <text x="136" y="484" fill="#05203C" font-size="22" font-family="Arial, sans-serif" font-weight="700">2. What information is missing when choosing between ad formats?</text>
    <rect x="136" y="506" width="1168" height="60" rx="18" fill="#F7FAFD" stroke="#D7E2ED" stroke-width="2"/>

    <text x="136" y="608" fill="#05203C" font-size="22" font-family="Arial, sans-serif" font-weight="700">3. Which analytics metric do you check first after launching an ad?</text>
    <rect x="136" y="630" width="1168" height="60" rx="18" fill="#F7FAFD" stroke="#D7E2ED" stroke-width="2"/>

    <text x="136" y="732" fill="#05203C" font-size="22" font-family="Arial, sans-serif" font-weight="700">4. What makes the current dashboard easy or difficult to scan quickly?</text>
    <rect x="136" y="754" width="1168" height="60" rx="18" fill="#F7FAFD" stroke="#D7E2ED" stroke-width="2"/>

    <text x="136" y="856" fill="#05203C" font-size="22" font-family="Arial, sans-serif" font-weight="700">5. What is one change that would make this workflow feel more trustworthy?</text>
    <rect x="136" y="878" width="1168" height="60" rx="18" fill="#F7FAFD" stroke="#D7E2ED" stroke-width="2"/>
  </g>

  <rect x="1010" y="948" width="154" height="52" rx="26" fill="#EDF4FB"/>
  <text x="1044" y="981" fill="#05203C" font-size="20" font-family="Arial, sans-serif" font-weight="700">Save draft</text>
  <rect x="1184" y="948" width="160" height="52" rx="26" fill="#0062E3"/>
  <text x="1234" y="981" fill="white" font-size="20" font-family="Arial, sans-serif" font-weight="700">Submit</text>
</svg>
