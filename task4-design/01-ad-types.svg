      <tspan x="984" dy="30">demonstrate itineraries, and keep</tspan>
      <tspan x="984" dy="30">attention longer.</tspan>
    </text>
    <rect x="984" y="698" width="328" height="1" fill="#E2EAF3"/>
    <text x="984" y="742" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Best for storytelling and launches</text>
    <text x="984" y="776" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Recommended for premium placements</text>
    <rect x="984" y="792" width="168" height="56" rx="28" fill="#05203C"/>
    <text x="1030" y="827" fill="white" font-size="22" font-family="Arial, sans-serif" font-weight="700">Select</text>
    <text x="1178" y="826" fill="#0062E3" font-size="22" font-family="Arial, sans-serif" font-weight="700">Preview</text>
  </g>
