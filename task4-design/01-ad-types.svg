      <tspan x="556" dy="30">destination imagery to improve</tspan>
      <tspan x="556" dy="30">recall and click-through.</tspan>
    </text>
    <rect x="556" y="698" width="328" height="1" fill="#E2EAF3"/>
    <text x="556" y="742" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Best for inspiration campaigns</text>
    <text x="556" y="776" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Supports product and destination art</text>
    <rect x="556" y="792" width="168" height="56" rx="28" fill="#0062E3"/>
    <text x="602" y="827" fill="white" font-size="22" font-family="Arial, sans-serif" font-weight="700">Select</text>
    <text x="750" y="826" fill="#0062E3" font-size="22" font-family="Arial, sans-serif" font-weight="700">Preview</text>
  </g>

  <g>
    <rect x="984" y="364" width="96" height="96" rx="24" fill="#FFF4EF"/>
    <use href="#icon-video" x="992" y="372" width="80" height="80"/>
    <rect x="984" y="480" width="146" height="34" rx="17" fill="#E9F7FF"/>
    <text x="1009" y="503" fill="#0062E3" font-size="18" font-family="Arial, sans-serif" font-weight="700">High impact</text>
    <text x="984" y="562" fill="#05203C" font-size="34" font-family="Arial, sans-serif" font-weight="700">Video Ad</text>
    <text x="984" y="606" fill="#506072" font-size="22" font-family="Arial, sans-serif">
