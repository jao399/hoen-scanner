<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero" x1="116" y1="84" x2="1240" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05203C"/>
      <stop offset="1" stop-color="#0062E3"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2000" height="2000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#05203C" flood-opacity="0.12"/>
    </filter>
    <symbol id="icon-text" viewBox="0 0 80 80">
      <rect x="10" y="14" width="60" height="52" rx="14" fill="#D9F8FF"/>
      <rect x="22" y="28" width="36" height="6" rx="3" fill="#0062E3"/>
      <rect x="22" y="40" width="28" height="6" rx="3" fill="#05203C" fill-opacity="0.86"/>
      <rect x="22" y="52" width="20" height="6" rx="3" fill="#05203C" fill-opacity="0.56"/>
    </symbol>
    <symbol id="icon-image-text" viewBox="0 0 80 80">
      <rect x="10" y="14" width="60" height="52" rx="14" fill="#D4FFF2"/>
      <rect x="20" y="24" width="20" height="20" rx="6" fill="#0FA1A9"/>
      <path d="M22 40L29 32L35 38L40 30L48 40H22Z" fill="#D4FFF2"/>
      <circle cx="34" cy="30" r="3" fill="#D4FFF2"/>
      <rect x="46" y="27" width="14" height="5" rx="2.5" fill="#05203C"/>
      <rect x="46" y="37" width="10" height="5" rx="2.5" fill="#05203C" fill-opacity="0.72"/>
      <rect x="20" y="50" width="40" height="5" rx="2.5" fill="#05203C" fill-opacity="0.58"/>
    </symbol>
    <symbol id="icon-video" viewBox="0 0 80 80">
      <rect x="10" y="14" width="60" height="52" rx="14" fill="#FFF1E8"/>
      <rect x="20" y="24" width="30" height="30" rx="10" fill="#FF7B59"/>
      <path d="M33 32L43 39L33 46V32Z" fill="white"/>
      <rect x="54" y="28" width="6" height="22" rx="3" fill="#05203C" fill-opacity="0.8"/>
      <rect x="20" y="58" width="40" height="4" rx="2" fill="#05203C" fill-opacity="0.52"/>
    </symbol>
  </defs>

  <rect width="1440" height="1024" fill="#F6FAFF"/>
  <rect x="48" y="40" width="1344" height="240" rx="36" fill="url(#hero)"/>
  <circle cx="1238" cy="132" r="116" fill="#A1EEFF" fill-opacity="0.16"/>
  <circle cx="1312" cy="220" r="58" fill="#93FFDE" fill-opacity="0.18"/>

  <text x="116" y="104" fill="white" font-size="28" font-family="Arial, sans-serif" font-weight="700">Skyscanner Ads</text>
  <text x="116" y="164" fill="white" font-size="54" font-family="Arial, sans-serif" font-weight="700">Choose the right ad format for your campaign</text>
  <text x="116" y="214" fill="#D9F8FF" font-size="24" font-family="Arial, sans-serif">
    <tspan x="116" dy="0">Start with a format that matches your storytelling needs, then reuse the same</tspan>
    <tspan x="116" dy="34">component pattern for future campaigns and experiments.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="96" y="332" width="392" height="488" rx="28" fill="white"/>
    <rect x="524" y="332" width="392" height="488" rx="28" fill="white"/>
    <rect x="952" y="332" width="392" height="488" rx="28" fill="white"/>
  </g>

  <g>
    <rect x="128" y="364" width="96" height="96" rx="24" fill="#E9F7FF"/>
    <use href="#icon-text" x="136" y="372" width="80" height="80"/>
    <rect x="128" y="480" width="110" height="34" rx="17" fill="#D4FFF2"/>
    <text x="151" y="503" fill="#0A6F76" font-size="18" font-family="Arial, sans-serif" font-weight="700">Fast launch</text>
    <text x="128" y="562" fill="#05203C" font-size="34" font-family="Arial, sans-serif" font-weight="700">Text Ad</text>
    <text x="128" y="606" fill="#506072" font-size="22" font-family="Arial, sans-serif">
