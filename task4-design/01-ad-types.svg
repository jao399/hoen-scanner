      <tspan x="128" dy="30">messages, promos, and destination</tspan>
      <tspan x="128" dy="30">highlights.</tspan>
    </text>
    <rect x="128" y="698" width="328" height="1" fill="#E2EAF3"/>
    <text x="128" y="742" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Best for headline testing</text>
    <text x="128" y="776" fill="#05203C" font-size="20" font-family="Arial, sans-serif">Low creative production effort</text>
    <rect x="128" y="792" width="168" height="56" rx="28" fill="#05203C"/>
    <text x="174" y="827" fill="white" font-size="22" font-family="Arial, sans-serif" font-weight="700">Select</text>
    <text x="322" y="826" fill="#0062E3" font-size="22" font-family="Arial, sans-serif" font-weight="700">Preview</text>
  </g>

  <g>
    <rect x="556" y="364" width="96" height="96" rx="24" fill="#EFFFF9"/>
    <use href="#icon-image-text" x="564" y="372" width="80" height="80"/>
    <rect x="556" y="480" width="132" height="34" rx="17" fill="#FFF1E8"/>
    <text x="580" y="503" fill="#A44D36" font-size="18" font-family="Arial, sans-serif" font-weight="700">Top choice</text>
    <text x="556" y="562" fill="#05203C" font-size="34" font-family="Arial, sans-serif" font-weight="700">Image and Text Ad</text>
    <text x="556" y="606" fill="#506072" font-size="22" font-family="Arial, sans-serif">
